services:
  bot:
    container_name: telegram-spam-guard-bot
    build:
      context: .
      dockerfile: Dockerfile
    image: telegram-spam-guard-bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-replace_me}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      VERIFY_TIMEOUT_SECONDS: ${VERIFY_TIMEOUT_SECONDS:-180}
      DUPLICATE_MESSAGE_WINDOW_SECONDS: ${DUPLICATE_MESSAGE_WINDOW_SECONDS:-60}
      DUPLICATE_MESSAGE_WARN_THRESHOLD: ${DUPLICATE_MESSAGE_WARN_THRESHOLD:-3}
      DUPLICATE_MESSAGE_WARNING_TTL_SECONDS: ${DUPLICATE_MESSAGE_WARNING_TTL_SECONDS:-300}
      DUPLICATE_MESSAGE_KICK_GRACE_SECONDS: ${DUPLICATE_MESSAGE_KICK_GRACE_SECONDS:-3}
      DUPLICATE_WARNING_MESSAGE_TTL_SECONDS: ${DUPLICATE_WARNING_MESSAGE_TTL_SECONDS:-60}
      STOP_WORD_WARNING_TTL_SECONDS: ${STOP_WORD_WARNING_TTL_SECONDS:-300}
      STOP_WORD_WARNING_MESSAGE_TTL_SECONDS: ${STOP_WORD_WARNING_MESSAGE_TTL_SECONDS:-60}
      AUTO_DELETE_MESSAGE_CLEANUP_GRACE_SECONDS: ${AUTO_DELETE_MESSAGE_CLEANUP_GRACE_SECONDS:-86400}
      ACTION_MODE: ${ACTION_MODE:-notify_admin}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_ID: ${ADMIN_ID:-}
      LLM_API_KEY: ${LLM_API_KEY:-replace_me}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.example.com/v1}
      LLM_MODEL: ${LLM_MODEL:-replace_me}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-8}
      LLM_CACHE_TTL_SECONDS: ${LLM_CACHE_TTL_SECONDS:-300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-/app/logs/spam.log}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - bot_logs:/app/logs
    restart: unless-stopped
    stop_grace_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:8.8.0-alpine3.23
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  bot_logs:
  redis_data:
